<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mindmap Architect - Library Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<meta name="color-scheme" content="light dark">
  <script>
    {
      const storedTheme = localStorage.getItem("mindmap-theme") || "light";
      const isDark = storedTheme === "system"
        ? window.matchMedia("(prefers-color-scheme: dark)").matches
        : storedTheme === "dark";
      
      document.querySelector('meta[name="color-scheme"]').content = storedTheme === "system" ? "light dark" : storedTheme;
      document.documentElement.setAttribute("data-theme", isDark ? "dark" : "light");
    }
  </script>
  <style>
    :root {
      color-scheme: light dark;
      
      /* Base values (fallback for older browsers without light-dark support) */
      --bg-color: #141413;
      --panel-bg: #1f1f1e;
      --border-color: rgba(176, 174, 165, 0.12);
      --text-main: #faf9f5;
      --text-muted: #9c9a94;
      --accent: #d97757;
      --accent-glow: rgba(217, 119, 87, 0.15);
      --card-bg: #1b1b1a;
      --card-hover-border: rgba(217, 119, 87, 0.4);
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.6);
      --tab-bg: #222120;
      --tab-active-bg: #2a2928;
    }

    /* Fallback for system light preference in older browsers */
    @media (prefers-color-scheme: light) {
      :root:not([data-theme="dark"]) {
        --bg-color: #faf9f5;
        --panel-bg: #f3f2eb;
        --border-color: rgba(20, 20, 19, 0.08);
        --text-main: #141413;
        --text-muted: #706f6a;
        --accent-glow: rgba(217, 119, 87, 0.1);
        --card-bg: #ffffff;
        --card-hover-border: rgba(217, 119, 87, 0.5);
        --shadow: 0 10px 35px -10px rgba(0, 0, 0, 0.06);
        --tab-bg: #e8e6dc;
        --tab-active-bg: #dfdcd0;
      }
    }

    /* Pinned themes for older browsers */
    :root[data-theme="light"] {
      --bg-color: #faf9f5;
      --panel-bg: #f3f2eb;
      --border-color: rgba(20, 20, 19, 0.08);
      --text-main: #141413;
      --text-muted: #706f6a;
      --accent-glow: rgba(217, 119, 87, 0.1);
      --card-bg: #ffffff;
      --card-hover-border: rgba(217, 119, 87, 0.5);
      --shadow: 0 10px 35px -10px rgba(0, 0, 0, 0.06);
      --tab-bg: #e8e6dc;
      --tab-active-bg: #dfdcd0;
    }
    :root[data-theme="dark"] {
      --bg-color: #141413;
      --panel-bg: #1f1f1e;
      --border-color: rgba(176, 174, 165, 0.12);
      --text-main: #faf9f5;
      --text-muted: #9c9a94;
      --accent-glow: rgba(217, 119, 87, 0.15);
      --card-bg: #1b1b1a;
      --card-hover-border: rgba(217, 119, 87, 0.4);
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.6);
      --tab-bg: #222120;
      --tab-active-bg: #2a2928;
    }

    /* Modern color-scheme based styling using light-dark() */
    @supports (color: light-dark(white, black)) {
      :root {
        --bg-color: light-dark(#faf9f5, #141413);
        --panel-bg: light-dark(#f3f2eb, #1f1f1e);
        --border-color: light-dark(rgba(20, 20, 19, 0.08), rgba(176, 174, 165, 0.12));
        --text-main: light-dark(#141413, #faf9f5);
        --text-muted: light-dark(#706f6a, #9c9a94);
        --accent-glow: light-dark(rgba(217, 119, 87, 0.1), rgba(217, 119, 87, 0.15));
        --card-bg: light-dark(#ffffff, #1b1b1a);
        --card-hover-border: light-dark(rgba(217, 119, 87, 0.5), rgba(217, 119, 87, 0.4));
        --shadow: light-dark(0 10px 35px -10px rgba(0, 0, 0, 0.06), 0 10px 30px -10px rgba(0, 0, 0, 0.6));
        --tab-bg: light-dark(#e8e6dc, #222120);
        --tab-active-bg: light-dark(#dfdcd0, #2a2928);
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Lora', Georgia, serif;
    }

    h1, h2, .theme-toggle-btn, .search-input, .tab-btn, .card-title, .open-link, .badge, .meta-text {
      font-family: 'Poppins', Arial, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 24px;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .container {
      width: 100%;
      max-width: 1200px;
      display: flex;
      flex-direction: column;
      gap: 32px;
      flex: 1;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 24px;
    }

    .logo-wrapper h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--text-main) 40%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 30px;
      height: 30px;
      fill: var(--accent);
      stroke: var(--accent);
      flex-shrink: 0;
    }

    .theme-toggle-btn {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s ease;
      box-shadow: var(--shadow);
    }
    .theme-toggle-btn:hover {
      border-color: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    /* Controls Bar: Tabs & Search */
    .controls-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 8px;
    }

    .tabs {
      display: flex;
      gap: 8px;
    }

    .tab-btn {
      background: var(--tab-bg);
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      padding: 10px 20px;
      border-radius: 8px 8px 0 0;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      border-bottom: none;
      position: relative;
      top: 9px;
    }

    .tab-btn:hover {
      color: var(--text-main);
      background: var(--tab-active-bg);
    }

    .tab-btn.active {
      color: var(--accent);
      background: var(--card-bg);
      font-weight: 600;
      border-bottom: 2px solid var(--accent);
      top: 9px;
    }

    .search-wrapper {
      position: relative;
      width: 100%;
      max-width: 380px;
    }

    .search-input {
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 12px 16px 12px 42px;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s ease;
    }
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      fill: var(--text-muted);
      pointer-events: none;
    }

    /* Grid Layout */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
      margin-top: 12px;
    }

    @media (max-width: 1100px) {
      .grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 820px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 540px) {
      .grid { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s ease, border-color 0.3s ease;
      box-shadow: var(--shadow);
      text-decoration: none;
      color: inherit;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: var(--card-hover-border);
      box-shadow: 0 16px 36px -12px rgba(0, 0, 0, 0.4), 0 0 20px var(--accent-glow);
    }

    /* Card Preview (Thumbnail or SVG fallback) */
    .card-preview {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: var(--panel-bg);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid var(--border-color);
      overflow: hidden;
    }

    .card-thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
    }

    .card:hover .card-thumb {
      transform: scale(1.04);
    }

    .card-fallback {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #faf9f5;
      font-size: 0.9rem;
      position: relative;
    }

    .fallback-gradient-prompt { background: linear-gradient(135deg, #d97757, #b85a3c); }
    .fallback-gradient-youtube { background: linear-gradient(135deg, #b85a3c, #8c4628); }
    .fallback-gradient-file { background: linear-gradient(135deg, #788c5d, #5c6d46); }
    .fallback-gradient-lark { background: linear-gradient(135deg, #6a9bcc, #4d7aa6); }
    .fallback-gradient-mixed { background: linear-gradient(135deg, #b0aea5, #706f6a); }

    .fallback-icon {
      width: 48px;
      height: 48px;
      fill: rgba(255, 255, 255, 0.85);
      opacity: 0.9;
    }

    /* Card Content */
    .card-content {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1;
    }

    .card-header-info {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .card-title {
      font-size: 1.15rem;
      font-weight: 600;
      line-height: 1.35;
      color: var(--text-main);
    }

    .card-summary {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.5;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 8px;
      border-top: 1px solid rgba(176, 174, 165, 0.08);
    }

    .meta-text {
      font-size: 0.75rem;
      color: var(--text-muted);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .project-chip {
      background: var(--accent-glow);
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 600;
      font-family: 'Poppins', Arial, sans-serif;
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .open-link {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 9999px;
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .badge-prompt { background: rgba(217, 119, 87, 0.15); color: #d97757; }
    .badge-youtube { background: rgba(217, 119, 87, 0.10); color: #b85a3c; }
    .badge-file { background: rgba(120, 140, 93, 0.18); color: #788c5d; }
    .badge-lark { background: rgba(106, 155, 204, 0.18); color: #6a9bcc; }
    .badge-mixed { background: rgba(176, 174, 165, 0.18); color: #b0aea5; }

    :root[data-theme="light"] .badge-prompt { color: #b85a3c; }
    :root[data-theme="light"] .badge-youtube { color: #8c4628; }
    :root[data-theme="light"] .badge-file { color: #5c6d46; }
    :root[data-theme="light"] .badge-lark { color: #4d7aa6; }
    :root[data-theme="light"] .badge-mixed { color: #706f6a; }

    .badge-role {
      background: var(--panel-bg);
      border: 1px solid var(--border-color);
      color: var(--text-muted);
    }

    /* Empty State */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 40px;
      color: var(--text-muted);
      border: 1px dashed var(--border-color);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      background: var(--card-bg);
    }

    .empty-icon {
      width: 64px;
      height: 64px;
      fill: var(--text-muted);
      opacity: 0.6;
    }

    .empty-title {
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--text-main);
    }

    .empty-btn {
      background: var(--accent);
      color: #faf9f5;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .empty-btn:hover {
      background-color: #c05634;
    }

    footer {
      margin-top: 48px;
      border-top: 1px solid var(--border-color);
      padding-top: 24px;
      width: 100%;
      max-width: 1200px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }

    .footer-links {
      display: flex;
      gap: 16px;
    }

    .footer-link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.85rem;
      transition: color 0.2s;
    }
    .footer-link:hover {
      color: var(--text-main);
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <div class="logo-wrapper">
        <h1>
          <svg class="logo-icon" viewBox="0 0 24 24" aria-hidden="true">
            <!-- Branches mirror the mindmap renderer's cubic-bezier connectors -->
            <path d="M14.6 10.6 C 17 10.6 17.5 7 19.5 6" fill="none" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M14.6 13.4 C 17 13.4 17.5 17 19.5 18" fill="none" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M9.4 10.6 C 7 10.6 6.5 7 4.5 6" fill="none" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M9.4 13.4 C 7 13.4 6.5 17 4.5 18" fill="none" stroke-width="1.5" stroke-linecap="round"/>
            <!-- Outer leaf nodes -->
            <circle cx="19.5" cy="6" r="1.9" stroke="none"/>
            <circle cx="19.5" cy="18" r="1.9" stroke="none"/>
            <circle cx="4.5" cy="6" r="1.9" stroke="none"/>
            <circle cx="4.5" cy="18" r="1.9" stroke="none"/>
            <!-- Central hub -->
            <circle cx="12" cy="12" r="3" stroke="none"/>
          </svg>
          Mindmap Architect
        </h1>
      </div>
      <button class="theme-toggle-btn" id="theme-btn">
        <svg style="width:16px;height:16px;fill:currentColor" viewBox="0 0 24 24">
          <path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/>
        </svg>
        <span>Theme</span>
      </button>
    </header>

    <div class="controls-bar">
      <div class="tabs">
        <button class="tab-btn active" data-tab="recent">Recent</button>
        <button class="tab-btn" data-tab="mindmaps">Your mindmaps</button>
        <button class="tab-btn" data-tab="examples">Examples</button>
      </div>
      <div class="search-wrapper">
        <svg class="search-icon" viewBox="0 0 24 24">
          <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
        </svg>
        <input type="text" id="search" class="search-input" placeholder="Search mindmaps...">
      </div>
    </div>

    <div class="grid" id="mindmaps-grid">
      <!-- Loaded dynamically -->
    </div>
  </div>

  <footer>
    <div class="meta-text">
      Library Catalog &bull; Local server serving mindmaps dynamically
    </div>
    <div class="footer-links">
      <a class="footer-link" href="https://github.com/tobidsn/skills" target="_blank">Created by @tobidsn</a>
    </div>
  </footer>

  <script>
    // Embedded items database (populated by build script as fallback)
    let STATIC_ITEMS = [];
    try {
      STATIC_ITEMS = __ITEMS_PLACEHOLDER__;
    } catch (e) {
      console.warn("Raw dashboard mode: falling back to static examples.", e);
    }

    let MINDMAP_ITEMS = [];
    let currentTab = "recent";
    
    // Theme state
    let themeSetting = localStorage.getItem("mindmap-theme") || "light";

    const grid = document.getElementById("mindmaps-grid");
    const searchInput = document.getElementById("search");
    const themeBtn = document.getElementById("theme-btn");
    const tabButtons = document.querySelectorAll(".tab-btn");

    function applyTheme() {
      const isSystem = themeSetting === "system";
      const systemIsDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      const activeTheme = isSystem ? (systemIsDark ? "dark" : "light") : themeSetting;
      
      const meta = document.querySelector('meta[name="color-scheme"]');
      if (meta) {
        meta.content = isSystem ? "light dark" : themeSetting;
      }
      document.documentElement.setAttribute("data-theme", activeTheme);
      
      if (themeBtn) {
        const isDark = activeTheme === "dark";
        const span = themeBtn.querySelector("span");
        if (span) {
          span.textContent = isDark ? "Light Mode" : "Dark Mode";
        }
        const svg = themeBtn.querySelector("svg");
        if (svg) {
          svg.innerHTML = isDark 
            ? `<path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L18.36 16.95zm1.06-12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.39.39-1.03 0-1.41zm-12.37 12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.39.39-1.03 0-1.41z"/>`
            : `<path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/>`;
        }
      }
    }

    function handleThemeToggle() {
      const isSystem = themeSetting === "system";
      const systemIsDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      
      if (isSystem) {
        themeSetting = systemIsDark ? "light" : "dark";
      } else {
        themeSetting = "system";
      }
      
      localStorage.setItem("mindmap-theme", themeSetting);
      applyTheme();
    }

    window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => {
      if (themeSetting === "system") {
        applyTheme();
      }
    });

    themeBtn.addEventListener("click", handleThemeToggle);
    applyTheme();

    // Set up tabs click handlers
    tabButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        tabButtons.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentTab = btn.getAttribute("data-tab");
        renderGrid();
      });
    });

    searchInput.addEventListener("input", renderGrid);

    const STATIC_EXAMPLES = [
      {
        "slug": "atomic-habits-summary",
        "title": "Atomic Habits — Book Summary",
        "summary": "James Clear's four laws of behavior change: make it obvious, attractive, easy, and satisfying. Identity-based habits, environment design, and the 1% improvements compound.",
        "source_type": "file",
        "created_at": "2026-05-22T00:00:00",
        "has_thumbnail": true,
        "is_example": true
      },
      {
        "slug": "tokyo-7-day-trip",
        "title": "Tokyo 7-Day Trip Plan",
        "summary": "Day-by-day itinerary across Shibuya, Asakusa, Shinjuku, plus a Hakone day trip. Food map, Suica setup, budget breakdown, and packing notes for a first Tokyo visit.",
        "source_type": "prompt",
        "created_at": "2026-05-22T00:00:00",
        "has_thumbnail": true,
        "is_example": true
      },
      {
        "slug": "pasta-fundamentals",
        "title": "Pasta Cooking Fundamentals",
        "summary": "Dough types, sauce-to-pasta pairing, salting water properly, al dente timing, and the common mistakes home cooks make. From a Marco Pierre White masterclass.",
        "source_type": "youtube",
        "created_at": "2026-05-22T00:00:00",
        "has_thumbnail": true,
        "is_example": true
      }
    ];

    // Fetch dynamic database from python server if running
    async function loadData() {
      try {
        const response = await fetch("/api/mindmaps");
        if (response.ok) {
          MINDMAP_ITEMS = await response.json();
        } else {
          throw new Error("API failed");
        }
      } catch (err) {
        console.warn("Could not fetch /api/mindmaps, falling back to embedded vault snapshot.", err);
        // Scanned items already carry is_example, source_project, etc.
        MINDMAP_ITEMS = [...STATIC_ITEMS];
      }

      // Only fall back to embedded STATIC_EXAMPLES if the vault has no examples yet.
      const hasExamples = MINDMAP_ITEMS.some(item => item.is_example);
      if (!hasExamples) {
        MINDMAP_ITEMS = [...MINDMAP_ITEMS, ...STATIC_EXAMPLES];
      }
      if (MINDMAP_ITEMS.length === 0) {
        MINDMAP_ITEMS = [...STATIC_EXAMPLES];
      }

      renderGrid();
    }

    function formatDate(isoString) {
      if (!isoString) return "";
      try {
        const date = new Date(isoString);
        return date.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
      } catch (e) {
        return "";
      }
    }

    function getFallbackSVGPath(sourceType) {
      switch (sourceType) {
        case 'youtube':
          return `<svg class="fallback-icon" viewBox="0 0 24 24"><path d="M23 12s-2.005-7-11-7S1 12 1 12s2.005 7 11 7 11-7 11-7zM3.877 12c.504-1.282 1.343-2.383 2.402-3.178C8.1 7.423 9.965 7 12 7c2.035 0 3.9.423 5.72 1.822 1.06.795 1.898 1.896 2.403 3.178-.505 1.282-1.344 2.383-2.403 3.178C15.9 16.577 14.035 17 12 17c-2.035 0-3.9-.423-5.72-1.822a6.34 6.34 0 0 1-2.403-3.178zM12 9c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>`;
        case 'file':
          return `<svg class="fallback-icon" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>`;
        case 'lark':
          return `<svg class="fallback-icon" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zM6 20V4h7v5h5v11H6z"/></svg>`;
        case 'mixed':
          return `<svg class="fallback-icon" viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12z"/></svg>`;
        default: // prompt or other
          return `<svg class="fallback-icon" viewBox="0 0 24 24"><path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg>`;
      }
    }

    function renderGrid() {
      const query = searchInput.value.toLowerCase().trim();
      grid.innerHTML = "";

      // 1. Filter by Tab
      let items = [];
      if (currentTab === "recent") {
        // Show recent user designs (excluding examples), limit to 4
        items = MINDMAP_ITEMS.filter(item => !item.is_example);
      } else if (currentTab === "mindmaps") {
        items = MINDMAP_ITEMS.filter(item => !item.is_example);
      } else if (currentTab === "examples") {
        items = MINDMAP_ITEMS.filter(item => item.is_example);
      }

      // 2. Filter by Search Query
      if (query) {
        items = items.filter(item => {
          return item.title.toLowerCase().includes(query) || 
                 item.summary.toLowerCase().includes(query) ||
                 (item.source_type && item.source_type.toLowerCase().includes(query));
        });
      }

      // 3. Post-Process Tabs Limits
      if (currentTab === "recent" && !query) {
        items = items.slice(0, 4);
      }

      // 4. Render Grid
      if (items.length === 0) {
        if (currentTab === "recent" && !query) {
          grid.innerHTML = `
            <div class="empty-state">
              <svg class="empty-icon" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
              <div class="empty-title">No mindmaps generated yet</div>
              <p>Generate your first mindmap using the custom skill, or explore the examples tab to see references.</p>
              <button class="empty-btn" onclick="document.querySelector('[data-tab=examples]').click()">View Pre-Built Examples</button>
            </div>`;
        } else {
          grid.innerHTML = `<div class="empty-state"><div class="empty-title">No matches found</div><p>Try refining your search terms or checking another tab.</p></div>`;
        }
        return;
      }

      items.forEach(item => {
        const card = document.createElement("a");
        card.className = "card";
        
        // Single-vault model: every mindmap lives at <vault>/{slug}/
        const pageUrl = `${item.slug}/index.html`;
        const imgUrl = `${item.slug}/export.png`;

        // Render card preview segment
        let previewHtml = "";
        if (item.has_thumbnail) {
          previewHtml = `<img class="card-thumb" src="${imgUrl}" alt="${item.title}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" /><div class="card-fallback fallback-gradient-${item.source_type || 'prompt'}" style="display:none;">${getFallbackSVGPath(item.source_type)}</div>`;
        } else {
          previewHtml = `<div class="card-fallback fallback-gradient-${item.source_type || 'prompt'}">${getFallbackSVGPath(item.source_type)}</div>`;
        }

        // Compute role label matching the mockup
        let roleBadge = "";
        if (item.is_example) {
          roleBadge = `<span class="badge badge-role">Quick tutorial</span>`;
        } else {
          roleBadge = `<span class="badge badge-role">Owner</span>`;
        }

        // Compute date meta text
        let dateMeta = "";
        if (item.is_example) {
          dateMeta = "Official Example";
        } else if (item.created_at) {
          dateMeta = formatDate(item.created_at);
        } else {
          dateMeta = "Your mindmap";
        }

        // Project source chip (only if source_path is recorded)
        const projectChip = item.source_project
          ? `<span class="project-chip" title="${item.source_path || ''}">${item.source_project}</span>`
          : "";

        card.href = pageUrl;
        card.innerHTML = `
          <div class="card-preview">
            ${previewHtml}
          </div>
          <div class="card-content">
            <div class="card-header-info">
              <div class="card-title">${item.title}</div>
              ${roleBadge}
            </div>
            <div class="card-summary">${item.summary}</div>
            <div class="card-footer">
              <span class="badge badge-${item.source_type || 'prompt'}">${item.source_type || 'prompt'}</span>
              <span class="meta-text">${projectChip}${dateMeta}</span>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    // Load initial data
    loadData();
  </script>
</body>
</html>
